<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Poder de la Imaginación</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --fs: 22px;
  --lh: 2.1;
  --pg: #fdf6e3;
  --tx: #3b2f1e;
  --mu: #7a6040;
  --ac: #8b6914;
  --bd: #c9aa7c;
  --gold: #c8a86b;
  --frame: #1a140d;
  --frame2: #241b0f;
  --bar: #3a2e1a;
}

html { height: 100%; }

body {
  font-family: 'Lexend', sans-serif;
  background: #12100a;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 24px 12px 40px;
}

/* ── DISPOSITIVO ── */
.kindle {
  width: 100%;
  max-width: 860px;
  background: var(--frame);
  border-radius: 20px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--frame);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1.5px solid var(--bar);
  gap: 12px;
  flex-shrink: 0;
}

.book-title {
  font-family: 'Lora', serif;
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 0.05em;
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.topbar-right { display: flex; gap: 8px; flex-shrink: 0; }

.icon-btn {
  background: #2e2312;
  border: 1px solid var(--bar);
  color: var(--gold);
  cursor: pointer;
  width: 44px; height: 44px;
  border-radius: 10px;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.icon-btn:hover { background: #3a2e18; border-color: var(--gold); }

/* ── PANTALLA — SCROLL AQUÍ ── */
.screen {
  background: var(--pg);
  padding: 48px 64px;
  /* SIN height fija — crece con el contenido */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: background 0.3s;
  position: relative;
}

.screen.dark  { --pg:#1c1710; --tx:#d4b896; --mu:#9e8060; --ac:#c8a86b; --bd:#5a4020; background:#1c1710; }
.screen.white { --pg:#fff;    --tx:#111;    --mu:#555;    --ac:#7a5c00; --bd:#ccc;    background:#fff; }

/* ── TOC ── */
.toc-panel {
  display: none;
  position: absolute; inset: 0;
  background: var(--pg);
  z-index: 20;
  padding: 36px 40px;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.toc-panel.open { display: flex; }

.toc-heading {
  font-family: 'Lora', serif; font-size: 22px; color: var(--ac);
  margin-bottom: 24px; border-bottom: 1.5px solid var(--bd); padding-bottom: 14px;
}
.toc-list { list-style: none; flex: 1; }
.toc-item {
  padding: 16px 0; border-bottom: 0.5px solid var(--bd);
  cursor: pointer; display: flex; gap: 16px; align-items: flex-start; transition: opacity 0.2s;
}
.toc-item:hover { opacity: 0.6; }
.toc-num { font-size: 12px; color: var(--ac); font-family:'Lora',serif; font-style:italic; min-width:100px; padding-top:3px; }
.toc-name { font-size: 18px; color: var(--tx); line-height: 1.4; }
.toc-close {
  background: var(--ac); border: none; color: #fff;
  padding: 14px 28px; border-radius: 12px;
  font-family: 'Lexend',sans-serif; font-size: 16px;
  cursor: pointer; align-self: flex-start; margin-top: 24px;
}
.toc-close:hover { opacity: 0.85; }

/* ── PORTADA — simple ── */
.cover {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 80px 20px;
}
.cover-title {
  font-family: 'Lora', serif; font-size: 42px; font-weight: 600;
  color: var(--tx); line-height: 1.2; margin-bottom: 20px;
}
.cover-divider { width: 56px; height: 2px; background: var(--bd); margin: 0 auto 20px; }
.cover-author { font-size: 14px; color: var(--mu); letter-spacing: 0.2em; text-transform: uppercase; }

/* ── CONTENIDO ── */
.section-tag {
  font-size: 11px; letter-spacing: 0.22em; color: var(--ac);
  text-transform: uppercase; margin-bottom: 8px; opacity: 0.75;
}
.ch-title {
  font-family: 'Lora', serif; font-size: 28px; font-weight: 600;
  color: var(--tx); margin-bottom: 32px; line-height: 1.25;
  border-bottom: 1.5px solid var(--bd); padding-bottom: 20px;
}
.body-text {
  font-family: 'Lexend', sans-serif;
  font-size: var(--fs); line-height: var(--lh);
  color: var(--tx); letter-spacing: 0.025em; word-spacing: 0.07em;
}
.body-text p { margin-bottom: 1.5em; }
.body-text p:first-child::first-letter {
  font-family: 'Lora', serif; font-size: 3.4em; font-weight: 600;
  float: left; line-height: 0.78; margin-right: 10px; margin-top: 7px; color: var(--ac);
}
.verse-block {
  border-left: 3px solid var(--bd); padding: 16px 24px;
  margin: 24px 0; background: rgba(139,105,20,0.07); border-radius: 0 10px 10px 0;
}
.verse-block p { font-style: italic; margin-bottom: 0.5em; }
.verse-block .asterisk-note { font-size: 0.88em; font-style: normal; color: var(--mu); }
.verse-block .verse-ref { font-size: 0.82em; color: var(--mu); font-style: normal; margin-bottom: 0; margin-top: 8px; }

/* ── BARRA PROGRESO ── */
.prog-bar-wrap {
  background: var(--frame); padding: 10px 24px;
  display: flex; align-items: center; gap: 14px;
  border-top: 1.5px solid var(--bar); flex-shrink: 0;
}
.prog-track { flex:1; height:6px; background:var(--bar); border-radius:3px; overflow:hidden; }
.prog-fill  { height:100%; background:var(--gold); border-radius:3px; transition:width 0.4s; width:0%; }
.prog-label { font-size:12px; color:var(--gold); white-space:nowrap; font-family:'Lexend',sans-serif; min-width:70px; text-align:right; }

/* ── NAVEGACIÓN ── */
.nav-bar {
  background: var(--frame2); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; border-top: 1.5px solid var(--bar); flex-shrink: 0;
}
.nav-btn {
  background: #2e2312; border: 1.5px solid var(--bar); color: var(--gold);
  cursor: pointer; font-size: 18px; font-family:'Lexend',sans-serif; font-weight:500;
  padding: 16px 28px; border-radius: 12px;
  display: flex; align-items: center; gap: 8px;
  min-width: 130px; justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.nav-btn:hover { background:#3a2e18; border-color:var(--gold); }
.nav-btn:disabled { opacity:0.25; cursor:default; }
.chapter-indicator { font-size:12px; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; opacity:0.75; text-align:center; }

/* ── CONTROLES ── */
.controls-bar {
  background: var(--frame); padding: 14px 20px;
  display: flex; align-items: center; justify-content: center;
  gap: 24px; border-top: 1.5px solid var(--bar); flex-wrap: wrap; flex-shrink: 0;
}
.ctrl-group { display:flex; align-items:center; gap:8px; }
.ctrl-label { font-size:11px; color:#9a7a4a; letter-spacing:0.12em; text-transform:uppercase; white-space:nowrap; }
.ctrl-btn {
  background:#2e2312; border:1.5px solid var(--bar); color:var(--gold);
  cursor:pointer; font-size:16px; font-weight:600;
  width:48px; height:48px; border-radius:10px; font-family:'Lexend',sans-serif;
  display:flex; align-items:center; justify-content:center; transition:background 0.2s;
}
.ctrl-btn:hover { background:#3a2e18; border-color:var(--gold); }
.fs-display { font-size:14px; color:var(--gold); min-width:48px; text-align:center; font-family:'Lexend',sans-serif; }
.theme-btn {
  width:36px; height:36px; border-radius:50%;
  border:2.5px solid var(--bar); cursor:pointer; transition:border-color 0.2s, transform 0.15s;
}
.theme-btn:hover { transform:scale(1.12); }
.theme-btn.active { border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,168,107,0.35); }
.t-sepia { background:#f5ead0; } .t-white { background:#fff; border-color:#888; } .t-dark { background:#1c1710; }

/* ── MÓVIL ── */
@media (max-width: 600px) {
  body { padding: 0 0 20px; }
  .kindle { border-radius: 0; }
  .screen { padding: 28px 20px; }
  .ch-title { font-size: 22px; }
  .cover-title { font-size: 30px; }
  .nav-btn { font-size:16px; padding:14px 16px; min-width:0; flex:1; }
  .ctrl-btn { width:52px; height:52px; }
  .theme-btn { width:40px; height:40px; }
}

/* ── PC GRANDE ── */
@media (min-width: 1100px) {
  .screen { padding: 60px 100px; }
}
</style>
</head>
<body>
<div class="kindle">

  <div class="topbar">
    <span class="book-title">El Poder de la Imaginación</span>
    <div class="topbar-right">
      <button class="icon-btn" id="home-btn" title="Portada">⌂</button>
      <button class="icon-btn" id="toc-btn"  title="Contenido">☰</button>
      <button class="icon-btn" id="bm-btn"   title="Marcar página">🔖</button>
    </div>
  </div>

  <div class="screen" id="screen">
    <div class="toc-panel" id="toc-panel">

  <div class="prog-bar-wrap">

  <div class="controls-bar">
    <div class="ctrl-group">

    </div>
  </div>

</div>

<script>
const PAGES = [
  {
    section: '', title: 'Portada',
    html: `<div class="cover">
      <div class="cover-title">El Poder de la<br>Imaginación</div>
      <div class="cover-divider"></div>
      <div class="cover-author">Andrew Wommack</div>
    </div>`
  },
  {
    section: 'Introducción', title: 'Introducción',
    html: `<div class="body-text">
<p>La imaginación es el motor, la fuente de energía de la vida. Sin embargo, la mayoría de las personas no comprende su importancia. No entienden que Dios entretejió la imaginación en nuestra misma esencia. El Salmo 103:14 dice:</p>
<div class="verse-block">
  <p>Porque Él sabe de qué estamos hechos*,<br>se acuerda de que somos solo polvo.</p>
  <p class="asterisk-note">*(Lit: conoce nuestra estructura)</p>
  <p class="verse-ref">Salmos 103:14 Biblia de las Américas</p>
</div>
<p>La misma palabra hebrea que se tradujo como «estructura» en este versículo, fue traducida como «imaginación» o «imaginaciones» cinco veces en el Antiguo Testamento (Gén. 6:5, 8:21; Deut. 31:21; 1 Cró. 28:9 y 29:18). Nuestra imaginación es el armazón o la columna vertebral de nuestra existencia. Es la puerta hacia nuestro potencial y afecta nuestra manera de ver la vida (Prov. 23:7). Sin embargo, la gente suele relegar la imaginación al terreno de la fantasía infantil. Subestiman su influencia y tratan de recibir de Dios sin antes haber activado su imaginación.</p>
<p>Cuando Jamie y yo comenzamos en el ministerio, el Señor nos dio la visión de alcanzar multitudes, de impactar a personas en todo el mundo. Y aunque sabíamos que esta era la voluntad de Dios para nuestra vida, había muy poca evidencia que indicara que se haría realidad. Las personas se mantenían alejadas de nuestras reuniones por miles. Nos costaba mucho avanzar, y resultaba frustrante. Entonces, en 2002, el Señor me habló a través del Salmo 78 y me dijo que lo estaba limitando con mi mentalidad estrecha. Verás, aunque conocía la voluntad de Dios para mi vida, no podía verme a mí mismo cumpliéndola. No lograba visualizarme de pie frente a miles de personas, ni influyendo a millones a través de la televisión. No podía imaginar a la gente mencionando mi nombre a la par de otros ministros que habían impactado al mundo. Y como no podía verlo, no lo lograba. El Señor me mostró que, para cumplir su voluntad, tenía que cambiar mi forma de pensar. Debía empezar a usar mi imaginación.</p>
<p>Tu imaginación es como tu vientre espiritual; es tu centro creativo. Génesis 11 registra el relato de la torre de Babel. A medida que la población de la antigüedad crecía y comenzaba a esparcirse sobre la faz de la tierra, la gente se congregó en las llanuras de Babilonia. Allí, idearon un plan para hacerse de un nombre (Gén. 11:4) y llegar hasta el cielo.</p>
<div class="verse-block">
  <p>Y descendió el SEÑOR para ver la ciudad y la torre que edificaban los hijos de los hombres. Y dijo el SEÑOR: He aquí el pueblo es uno, y todos tienen un solo lenguaje; y han comenzado la obra, y ahora nada los detendrá de lo que han imaginado hacer.</p>
  <p class="verse-ref">Génesis 11:5-6, énfasis añadido</p>
</div>
<p>¡Es asombroso! La imaginación de este pueblo no regenerado representaba una amenaza tan grande para el plan de Dios para la humanidad, que Él tuvo que ponerles un obstáculo —confundiendo su idioma— para frenarlos y darle tiempo a su plan de desarrollarse. Dios vio la imaginación de ellos como una amenaza para su diseño humano. ¡Increíble!</p>
<p>La imaginación es poderosa. Es el primer paso para la acción. Si puedes imaginar algo, puedes hacerlo. Sin embargo, muchos cristianos no lo comprenden. Creyentes de todo el mundo oran por sanidad y jamás la experimentan. Oran por prosperidad, pero nunca la reciben. ¿Por qué? Porque no saben cómo usar la imaginación de forma positiva y guiada por el Espíritu. No se ven a sí mismos sanos. No se ven a sí mismos prósperos.</p>
<p>Si quieres ver cumplida la voluntad de Dios para tu vida, si deseas alcanzar todo tu potencial, necesitas comprender tanto el poder de tu imaginación como la forma correcta de utilizarla.</p>
</div>`
  },
  {
    section: 'Capítulo 1', title: '¿Qué es la imaginación?',
    html: `<div class="body-text">
<p>Según el Diccionario Electrónico Houghton Mifflin American Heritage, la palabra imaginación significa «el proceso o poder de formar una imagen mental de algo que no es real o que no está presente». Muchas personas confunden la imaginación con la visión. Sin embargo, la visión es «una imagen mental producida por la imaginación» (HMAHED, por sus siglas en inglés). No puedes tener una visión sin una imaginación. Y aunque a veces estas palabras se usen indistintamente, quiero enfocarme en la imaginación: la capacidad de ver lo que no está presente.</p>
<p>La mayoría de los adultos asocian la imaginación con la inmadurez. Les han enseñado que usar la imaginación o creer en algo que no pueden ver es una fantasía. Este mismo diccionario define fantasía como una «ilusión» o un «engaño», una «idea extravagante» o «soñar despierto». Basta con mirar la definición de la palabra engaño: «una creencia falsa que se sostiene a pesar de la evidencia que la invalida». La fantasía no es real. No se basa en pruebas comprobables. Pero la imaginación sí es real.</p>
<p>La imaginación es la capacidad de ver con la mente lo que no puedes ver con los ojos. Si te preguntara cuántas ventanas había en la casa de tu infancia, apuesto a que lo sabrías, aunque probablemente nunca las contaste. Gracias a tu imaginación, el ojo de tu mente puede recrear el hogar de tu niñez y llevarte por él, habitación por habitación.</p>
<p>Ya sea que te des cuenta o no, usas tu imaginación todos los días. La utilizas para recordar dónde estacionaste el auto o para darle indicaciones a alguien. No puedes vivir sin imaginación. Si yo te dijera la palabra perro, no visualizarías las letras P-E-R-R-O en tu mente. En su lugar, tu mente evocaría la imagen de un perro. Si tuvieras un perrito blanco, probablemente esa sería la imagen que verías. Pero yo podría cambiar tu imagen con mis palabras. Si dijera las palabras perro negro y grande, tu imagen cambiaría.</p>
<p>La imaginación te ayuda a «ver» lo que no se puede ver. Crea las imágenes en tu mente que te ayudan a recordar, leer y planificar. Pero la imaginación solo puede trabajar con la información que tú le das, sea buena o mala, correcta o incorrecta (Luc. 6:45). Si llenas tu imaginación con la basura de este mundo, eso es lo que producirá. Pero si renuevas tu mente con la verdad de la Palabra, tu imaginación te ayudará a recibir de Dios (Rom. 12:2).</p>
<p>Si tuviera el espacio, podría repasar casi todos los personajes principales de la Biblia y mostrar cómo cada uno usó su imaginación para recibir de Dios. Cuando el Señor le habló a Abram (antes de que su nombre fuera cambiado a Abraham) en Génesis, Dios le dijo que dejara la casa de su padre y fuera a una tierra que más tarde heredaría (Gén. 12:1). Abram no podía ver la tierra de la que Dios hablaba; no sabía por experiencia que sería una buena tierra. Hasta donde sabemos, nunca había viajado más allá de Harán (Gén. 11:31). Entonces, ¿por qué Abram dejó todo lo que conocía? Creo que fue porque las palabras del Señor activaron su imaginación.</p>
<p>La imaginación de Abram fue esencial para su capacidad de recibir de Dios, y así convertirse en Abraham. Y lo mismo ocurre con la tuya. No puedes cumplir la voluntad de Dios para tu vida por accidente. Hace un tiempo, recibí un correo electrónico de una mujer que trabaja en uno de nuestros campus del instituto bíblico. Estaba alabando al Señor y dándome las gracias, diciendo: «Fui hecha para lo que estoy haciendo. Este es exactamente el lugar donde Dios quiere que esté». Lamentablemente, la mayoría de las personas no pueden decir lo mismo. No conocen la voluntad de Dios para su vida. No tienen una visión —una imagen mental— de su futuro. Son como el agua: simplemente se dejan llevar por la corriente, siguiendo el camino de menor resistencia. Pero cualquier pez, incluso uno muerto, puede flotar río abajo.</p>
<p>Cuando el Señor le habló a Abram y le dijo que fuera, Abram no sabía a dónde iba. No sabía cómo sería la vida fuera de Harán, pero emprendió el viaje de todos modos. Abram tenía la visión de una herencia mejor que la que Ur o Harán podían ofrecerle, y mientras buscaba al Señor, la imaginación de Abram comenzó a trabajar. A medida que recorría la tierra, Abram se veía a sí mismo poseyéndola. Veía a sus descendientes viviendo allí. Su imaginación produjo una visión que se volvía cada vez más clara a medida que se alejaba de Ur.</p>
<p>Creo que por eso el Señor le dio a Abraham la promesa de que su descendencia sería tan numerosa como «el polvo de la tierra» (Gén. 13:16) y «las estrellas» (Gén. 15:5). Todos los días Abraham tenía polvo en los pies, y todas las noches miraba las estrellas. Estas cosas mantenían la promesa de Dios constantemente frente a él y ayudaban a avivar su imaginación.</p>
<p>La visión de Abraham fue como un mapa de ruta para su vida. Piénsalo. Si estuvieras viajando de Colorado a Nueva York, querrías un mapa: una idea o imagen de hacia dónde te diriges. Sin uno, cualquier camino daría igual. Pero no cualquier camino te llevará a donde quieres ir en la vida.</p>
<p>La mayoría de los cristianos no tienen una visión clara para su vida. No logran ver la voluntad de Dios. Sin embargo, en lugar de buscar al Señor y activar su imaginación como lo hizo Abraham, dejan que las circunstancias de la vida los empujen de un lado a otro. Abandonan una buena iglesia y el sistema de apoyo de amigos y familiares para mudarse al otro lado del país por un aumento de cien dólares. Gastan miles en medicamentos que les ayudan a sobrellevar la enfermedad y el dolor. Hipotecan su futuro para comprar botes que no usarán y televisores adicionales que no necesitan. Se conforman con menos de lo mejor de Dios.</p>
<p>Proverbios 29:18 dice: «Donde no hay visión, el pueblo perece». La visión, o la imagen producida en tu imaginación, te da esperanza para el futuro. Sin ella, nunca cumplirás el plan de Dios para tu vida. Las circunstancias te desviarán, las dificultades te robarán y terminarás rindiéndote. En los cincuenta años transcurridos desde que Dios nos llamó a Jamie y a mí al ministerio, hemos tenido muchas oportunidades para rendirnos. Hemos lidiado con la pobreza y la calumnia, y hemos perdido relaciones, pero la visión nos mantuvo en marcha. Cuando me escupieron y me amenazaron a punta de pistola, cuando la gente mintió sobre mí, cuando la gente llamó secta al ministerio, habría sido fácil decir: «Esto no vale la pena». En lugar de eso, dejé que mi visión me motivara. Me animé a mí mismo enfocándome en lo que Dios me dijo que hiciera, ¡y ahora está dando frutos!</p>
<p>La visión de una persona la sostendrá cuando todo a su alrededor parezca contrario.</p>
<p>¿Tienes una visión: una imagen del futuro llena de esperanza? ¿Coincide esa imagen con la que Dios tiene para ti? La buena noticia es que, independientemente de las decisiones que hayas tomado o de lo lejos que te encuentres de tu rumbo, Dios es mejor que cualquier sistema GPS. Si has tomado un camino equivocado o te has desviado, Él puede hacer que regreses a la ruta. Pero necesitarás el poder de tu imaginación.</p>
</div>`
  },
  {
    section: 'Capítulo 2', title: 'El eslabón perdido',
    html: `<div class="body-text">
<p>Tu imaginación es responsable de trazar la ruta que sigue tu vida. Te des cuenta o no, tu vida es exactamente como la has imaginado. Proverbios 23:7 dice: «Porque cual es su pensamiento en su corazón, tal es él». Si te ves a ti mismo pobre, no importa cuántos ceros tenga tu cheque de pago, el dinero nunca te alcanzará para llegar a fin de mes. Si te sientes víctima u oprimido, siempre habrá alguna persona o circunstancia que te impida alcanzar tus metas. Quizá sepas que Dios quiere que estés sano y próspero (3 Juan 2). Tal vez incluso estés orando por ello. Pero si no puedes verte a ti mismo como Dios te ve, nunca experimentarás lo mejor que Él tiene para ti.</p>
<p>Hace años, vino a trabajar con nosotros una mujer que había sufrido abusos por parte de su marido. Aunque había logrado salir de esa situación, les temía a los hombres; a todos ellos. En su mente, los hombres eran malos y no se podía confiar en ninguno. Para ella, cualquier cosa que hiciera un hombre era un intento de controlarla o manipularla. Esta mujer permitió que las circunstancias de su pasado pintaran un cuadro distorsionado de la realidad, y filtraba cada interacción a través de esa imagen. Su imaginación estaba fuera de control, y le costó muy caro.</p>
<p>Tu imaginación es el factor de control predominante en tu vida. Funciona como el regulador de velocidad de un automóvil. Algunos vehículos vienen con mecanismos de seguridad integrados llamados limitadores. Un limitador controla la velocidad del auto. Una vez que el conductor alcanza la velocidad máxima configurada, el limitador se activa para restringir la cantidad de aire y combustible que recibe el motor. Sin importar lo que haga el conductor, no puede superar ese límite. Tu imaginación funciona de la misma manera. Pero a diferencia de un automóvil, el Fabricante no establece los límites de tu imaginación. Lo haces tú.</p>
<p>Un buen amigo mío creció con un padre cruel y colérico. Vivir bajo su techo era opresivo. Una vez me contó que su padre usaba autos viejos para sacarles repuestos. Probablemente tenían unos cincuenta autos chatarra estacionados en su granja en cualquier momento dado, y su papá sacaba piezas de uno para reparar otro. Cada vez que mi amigo lo ayudaba a reparar los vehículos, su padre le decía: «¡Eres un estúpido! Ni siquiera puedes enroscar una tuerca en un tornillo».</p>
<p>Después de años de escuchar ese mensaje, se convirtió en una profecía autocumplida en la vida de mi amigo. Recuerdo haber trabajado con él en un auto años más tarde. Y a pesar de lo inteligente y capaz que era, lo veía temblar cada vez que tenía que poner una tuerca en un tornillo, aterrorizado de dañar la rosca. En una ocasión, mi amigo había colocado la tuerca perfectamente bien, pero tenía tanto miedo de haberla enroscado mal, que la quitó y la volvió a poner. Lo hizo una y otra vez hasta que, finalmente, terminó dañando la rosca de ese tornillo. Hasta el día de hoy, nunca lo he visto colocar una tuerca en un tornillo sin arruinar la rosca. Las palabras de su padre pintaron una imagen en su mente que limitó su capacidad.</p>
<p>Quizá no te des cuenta, pero lo filtras todo (quién eres, qué puedes hacer, tus circunstancias e incluso cómo te han tratado) a través de tu imaginación. Y esa imaginación, si no se dirige correctamente, limita lo que Dios puede hacer en tu vida.</p>
<p>Mi madre era maestra de escuela. Amaba la educación y siempre le daba mucha importancia a nuestros logros académicos. Cuando yo estaba en sexto grado, mi hermano tomó una prueba que clasificó su coeficiente intelectual en el nivel de genio. Al escuchar a mi madre hablar sobre sus resultados, le pregunté por mi puntaje. Me respondió que yo estaba «dos puntos por encima de un idiota». Años más tarde, se reía de aquel día diciendo: «Eso no es cierto, Andy. Seguramente estaba bromeando contigo». Pero yo nunca supe que era una broma. Sus palabras, dichas en chiste, pintaron en mi mente un cuadro de mediocridad con el que luché durante años. No fue sino hasta que el Señor me reveló la verdad sobre el espíritu, el alma y el cuerpo, que mi imaginación comenzó a cambiar.</p>
<p>Antes de comprender el concepto de espíritu, alma y cuerpo, el reflejo en el espejo era el único «yo» que conocía. Las opiniones de los demás y mis propios sentimientos dirigían mi vida. No me daba cuenta de que mi verdadero yo —mi espíritu— era la parte de mí creada a imagen de Dios (Gén. 1:26).</p>
<div class="verse-block">
  <p>Y el mismo Dios de paz os santifique por completo; y ruego a Dios que todo vuestro ser, espíritu, alma y cuerpo, sea guardado irreprensible para la venida de nuestro Señor Jesucristo.</p>
  <p class="verse-ref">1 Tesalonicenses 5:23</p>
</div>
<p>No podemos ver, escuchar ni sentir nuestro espíritu con los cinco sentidos naturales (1 Cor. 2:14). Solo hay una manera de comprender lo que es el espíritu: mirar en la Palabra de Dios.</p>
<div class="verse-block">
  <p>Porque la palabra de Dios es viva y eficaz, y más cortante que toda espada de dos filos; y penetra hasta partir el alma y el espíritu, las coyunturas y los tuétanos, y discierne los pensamientos y las intenciones del corazón.</p>
  <p class="verse-ref">Hebreos 4:12</p>
</div>
<p>La Palabra de Dios nos muestra la verdad espiritual. Jesús dijo: «El espíritu es el que da vida; la carne para nada aprovecha; las palabras que yo os he hablado son espíritu y son vida» (Juan 6:63).</p>
<p>Al comenzar a profundizar en la Palabra cuando era joven, descubrí que «el que se une al Señor, un espíritu es con él» (1 Cor. 6:17) y que «como él [Jesús] es, así somos nosotros en este mundo» (1 Juan 4:17, corchetes añadidos). Comencé a darme cuenta de que mi espíritu era idéntico al espíritu de Jesús y que yo podía hacer las mismas cosas que Él hizo (Juan 14:12). La Palabra de Dios comenzó a cambiar mi imagen interna y, a medida que esa imagen cambiaba, también lo hacía yo. En lugar de ver a un introvertido en el espejo, vi a Jesús viviendo en mí. No vi a un hombre con un poco de la naturaleza de Jesús y un poco de la mía. Vi a un hombre poseído por Dios: alguien pleno y poderoso, capaz de sanar a los enfermos, resucitar a los muertos y usar la autoridad que Cristo le había otorgado (Mar. 16:17-18).</p>
<p>Una vez que vi esas cosas en mi imaginación, fue solo cuestión de tiempo antes de comenzar a verlas en mi vida. Desde entonces, he visto resucitar muertos, abrirse ojos ciegos y oídos sordos, personas sanadas de cáncer y a otras levantarse de sillas de ruedas. He visto toda clase de milagros. Mi propio hijo resucitó de entre los muertos. Todas estas cosas ocurrieron porque la Palabra de Dios pintó un cuadro diferente en mi imaginación.</p>
<p>Muchas personas desean ver lo milagroso. Quieren experimentar lo mejor de Dios y verlo obrar en sus vidas, pero no se ven a sí mismas como Dios las ve. En sus mentes, se limitan a ser solamente humanos. Pasan la vida lidiando con alergias, preocupándose por la bolsa de valores y temiendo cada informe que ven en la cadena de noticias de los «diez espías». Esperan enfermarse. Esperan envejecer y perder la vista.</p>
<p>¡Pero como creyentes, no somos solamente humanos! Nuestros cuerpos físicos pueden ser mortales, nuestras mentes aún pueden ser corruptibles, pero somos nuevas criaturas en Cristo Jesús (2 Cor. 5:17). El mismo Espíritu que levantó a Cristo de los muertos vive en nosotros. En nuestro espíritu somos puros y santos, llenos del poder de Dios. ¡Un tercio de nuestro ser es puro Espíritu Santo de pared a pared (Rom. 8:11)! Y si decidimos creerlo, nuestro espíritu dominará, superando todo lo que sucede en el ámbito físico. Pero primero necesitamos cambiar nuestra imaginación.</p>
<p>Hace años, John G. Lake, un conocido ministro de sanidad de principios del siglo XX, relató la historia de su experiencia en Sudáfrica durante un brote de peste bubónica. La gente enfermaba y caía muerta como moscas, pero nadie quería enterrar a los fallecidos. Todos estaban aterrorizados de contraer la mortal enfermedad; todos, excepto Lake.</p>
<p>Lake trabajó diligentemente durante la plaga, sepultando a varias personas al día, hasta que finalmente llegó un barco británico con suministros y médicos. Después de observar a Lake, uno de los doctores le preguntó cómo se había estado protegiendo de la infección. Lake respondió que la ley del Espíritu de vida en Cristo Jesús era su protección y que ningún germen se adheriría jamás a él.</p>
<p>No muchas personas dirían eso. Simplemente no logran verlo. Pero Lake sí pudo. Cuando declaró que ningún germen podía tocar su cuerpo y sobrevivir, los doctores se rieron. No le creyeron. Así que Lake propuso una prueba. Le pidió a un médico que recolectara saliva de uno de los muertos y la pusiera bajo el microscopio. Como era de esperar, gérmenes vivos cubrían el portaobjetos. Lake sugirió que pusieran esos gérmenes en sus manos y volvieran a observar. Los doctores lo hicieron, y lo que vieron los dejó atónitos. ¡Cuando los gérmenes tocaron la piel de Lake, murieron!</p>
<div class="verse-block">
  <p>No te sobrevendrá mal, ni plaga tocará tu morada.</p>
  <p class="verse-ref">Salmo 91:10</p>
</div>
<p>Cualquiera que crea en las promesas del Salmo 91 y las confiese con fe (Sal. 91:2) puede tener la misma protección contra las plagas que tuvo John G. Lake. Sin embargo, la mayoría de los cristianos nunca experimentan este tipo de resultados, porque se dejan impresionar más por lo que escuchan en las noticias que por lo que escuchan desde el púlpito. Los conmueve más lo que dice su médico que lo que dice Dios. En lugar de que su imagen interior provenga de la luz de la Palabra de Dios, proviene del resplandor de un televisor. La mayoría de los cristianos se limitan a la experiencia del mundo. No permiten que la Palabra de Dios cambie su imaginación.</p>
<p>Cuando el Señor me habló en 2002 (poco después de los ataques terroristas a las Torres Gemelas) y me dijo que lo estaba limitando, reuní a mi personal y les dije: «No sé cuánto tiempo tome cambiar esta imagen en mi interior, pero voy a cambiar. Voy a hacer lo que Dios me llamó a hacer». Aunque todo en lo natural gritaba que expandirse durante una época así era imposible, me sorprendió lo rápido que nuestro ministerio comenzó a prosperar.</p>
<p>Durante ese tiempo, nadie veía la televisión cristiana. Nadie estaba donando a los ministerios cristianos. La atención de todos estaba cautivada por las noticias. Todos los ministerios televisivos que conocía sufrieron. Los ministerios paraeclesiásticos recortaron drásticamente sus presupuestos. Entonces, sin previo aviso —antes de que pudiera enviarle siquiera un comunicado a mis colaboradores, antes de que pudiera hacer cualquier otra cosa más que cambiar mi imaginación—, nuestros ingresos se duplicaron. Fue como si en el ámbito espiritual hubiera una represa reteniendo todas las bendiciones que Dios quería hacerme llegar. Dios estaba proveyendo. Él estaba cumpliendo fielmente su Palabra. Pero algo había obstruido el flujo. Cuando encendí mi imaginación y cambié mi imagen interna, esa represa se rompió. Y tal como promete Deuteronomio 28:2, una inundación de la provisión de Dios me alcanzó.</p>
<p>Puedes leer más acerca de mi experiencia personal sobre cómo cambié mi imaginación en mi libro No limite a Dios.</p>
</div>`
  }
];

let cur = 0, fs = 22, tocOpen = false;
const screen   = document.getElementById('screen');
const content  = document.getElementById('content');
const progFill = document.getElementById('prog-fill');
const progLabel= document.getElementById('prog-label');
const prevBtn  = document.getElementById('prev-btn');
const nextBtn  = document.getElementById('next-btn');
const fsLabel  = document.getElementById('fs-label');
const tocPanel = document.getElementById('toc-panel');
const tocList  = document.getElementById('toc-list');
const chInd    = document.getElementById('chapter-indicator');

function goPage(i) {
  if (i < 0 || i >= PAGES.length) return;
  cur = i;
  const p = PAGES[i];
  content.innerHTML = i === 0
    ? p.html
    : `<div class="section-tag">${p.section}</div><div class="ch-title">${p.title}</div>${p.html}`;
  const pct = Math.round((i / (PAGES.length - 1)) * 100);
  progFill.style.width = pct + '%';
  progLabel.textContent = `${i + 1} de ${PAGES.length}`;
  chInd.textContent = p.section || 'Portada';
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === PAGES.length - 1;
  window.scrollTo(0, 0);
  closeTOC();
}

function buildTOC() {
  tocList.innerHTML = '';
  PAGES.forEach((p, i) => {
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.innerHTML = `<span class="toc-num">${p.section || 'Portada'}</span><span class="toc-name">${p.title}</span>`;
    li.addEventListener('click', () => goPage(i));
    tocList.appendChild(li);
  });
}
function openTOC() { tocOpen = true; buildTOC(); tocPanel.classList.add('open'); }
function closeTOC(){ tocOpen = false; tocPanel.classList.remove('open'); }

document.getElementById('home-btn').addEventListener('click', () => goPage(0));
document.getElementById('toc-btn').addEventListener('click', () => tocOpen ? closeTOC() : openTOC());
document.getElementById('toc-close').addEventListener('click', closeTOC);
document.getElementById('prev-btn').addEventListener('click', () => goPage(cur - 1));
document.getElementById('next-btn').addEventListener('click', () => goPage(cur + 1));

document.getElementById('fup').addEventListener('click', () => {
  if (fs < 40) { fs += 2; document.documentElement.style.setProperty('--fs', fs+'px'); fsLabel.textContent = fs; }
});
document.getElementById('fdn').addEventListener('click', () => {
  if (fs > 14) { fs -= 2; document.documentElement.style.setProperty('--fs', fs+'px'); fsLabel.textContent = fs; }
});

function setTheme(t) {
  screen.classList.remove('dark','white');
  ['th-sepia','th-white','th-dark'].forEach(id => document.getElementById(id).classList.remove('active'));
  if (t === 'dark')       { screen.classList.add('dark');  document.getElementById('th-dark').classList.add('active'); }
  else if (t === 'white') { screen.classList.add('white'); document.getElementById('th-white').classList.add('active'); }
  else                    { document.getElementById('th-sepia').classList.add('active'); }
}
document.getElementById('th-sepia').addEventListener('click', () => setTheme('sepia'));
document.getElementById('th-white').addEventListener('click', () => setTheme('white'));
document.getElementById('th-dark').addEventListener('click',  () => setTheme('dark'));

// Swipe móvil
let tx = 0;
screen.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
screen.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 60) { if (dx < 0) goPage(cur+1); else goPage(cur-1); }
}, { passive: true });

// Teclado
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goPage(cur+1);
  if (e.key === 'ArrowLeft')  goPage(cur-1);
});

goPage(0);
</script>
</body>
</html>
